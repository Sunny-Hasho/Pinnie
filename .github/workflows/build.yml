name: Build Pinnie

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore PinMe/Pinnie.csproj

    - name: Build
      run: dotnet build PinMe/Pinnie.csproj -c Release --no-restore

    - name: Publish Portable (Self-Contained)
      run: dotnet publish PinMe/Pinnie.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=false -o publish/Portable

    - name: Publish Lightweight (Framework-Dependent)
      run: dotnet publish PinMe/Pinnie.csproj -c Release -r win-x64 --no-self-contained -p:PublishSingleFile=true -p:PublishTrimmed=false -p:SelfContained=false -o publish/Lightweight

    - name: Upload Portable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Pinnie-Portable-win-x64
        path: publish/Portable/

    - name: Upload Lightweight Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Pinnie-Lightweight-win-x64
        path: publish/Lightweight/
