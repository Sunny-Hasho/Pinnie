name: Build and Release Pinnie

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Get Version from Tag
      id: get_version
      shell: bash
      run: |
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=v1.0.0-dev" >> $GITHUB_OUTPUT
        fi

    - name: Restore dependencies
      run: dotnet restore PinMe/Pinnie.csproj

    - name: Build
      run: dotnet build PinMe/Pinnie.csproj -c Release --no-restore

    - name: Publish Portable (Self-Contained)
      run: dotnet publish PinMe/Pinnie.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=false -o publish/Portable

    - name: Publish Lightweight (Framework-Dependent)
      run: dotnet publish PinMe/Pinnie.csproj -c Release -r win-x64 --no-self-contained -p:PublishSingleFile=true -p:PublishTrimmed=false -p:SelfContained=false -o publish/Lightweight

    - name: Create ZIP Archives
      shell: pwsh
      run: |
        $ver = "${{ steps.get_version.outputs.VERSION }}"
        Compress-Archive -Path publish/Portable/* -DestinationPath "Pinnie-$ver-Portable.zip"
        Compress-Archive -Path publish/Lightweight/* -DestinationPath "Pinnie-$ver-Lightweight.zip"

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: "*.zip"

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          Pinnie-${{ steps.get_version.outputs.VERSION }}-Portable.zip
          Pinnie-${{ steps.get_version.outputs.VERSION }}-Lightweight.zip
        body_path: RELEASE_NOTES.md
        generate_release_notes: true
        draft: false
        prerelease: false
